# /etc/nginx/sites-available/arminda.site.conf
#
# Vhost do Arminda em produção (arminda.site).
#
# Estrutura:
#   - SPA estática em /opt/arminda/frontend-dist/  (Vite build)
#   - API backend em 127.0.0.1:8001               (gunicorn)
#   - Admin Django em /admin/                     (mesmo gunicorn)
#   - Static files coletados em /opt/arminda/backend-static/
#
# HTTPS: depois de aplicar este arquivo (nginx -t && systemctl reload),
# rode `certbot --nginx -d arminda.site -d www.arminda.site --redirect`.
# O certbot reescreve este arquivo adicionando os blocos 443+SSL e o
# redirect 80→443.

# Upstream do gunicorn (loopback, sem TLS interno)
upstream arminda_backend {
    server 127.0.0.1:8001 fail_timeout=0;
    keepalive 16;
}

# HTTP — antes do certbot, atende; depois, vira só redirect 301
server {
    listen 80;
    listen [::]:80;
    server_name arminda.site www.arminda.site;

    # ACME challenge do Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Logs separados
    access_log /var/log/nginx/arminda.access.log;
    error_log  /var/log/nginx/arminda.error.log;

    # Tamanho máximo de upload (documentos de servidor: 10 MB)
    client_max_body_size 12M;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # ============================================================
    # Backend API + admin + schema
    # ============================================================
    location /api/ {
        proxy_pass http://arminda_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_read_timeout 90;
        proxy_send_timeout 90;
    }

    location /admin/ {
        proxy_pass http://arminda_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        proxy_read_timeout 90;
    }

    location /static/ {
        alias /opt/arminda/backend-static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/arminda/backend/media/;
        access_log off;
        expires 7d;
    }

    # ============================================================
    # Healthcheck (rápido, sem hit no SPA)
    # ============================================================
    location = /health {
        proxy_pass http://arminda_backend/api/health/;
        access_log off;
    }

    # ============================================================
    # Frontend SPA (Vite build)
    # ============================================================
    root /opt/arminda/frontend-dist;
    index index.html;

    # Assets do Vite (com hash no nome → cache agressivo)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — qualquer rota não-existente cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
